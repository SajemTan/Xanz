<!doctype html>
<html>
  <head>
    <title>Xanz Lexicon</title>
    <script type="text/javascript" src="lexicon.js"></script>
    <script type="text/javascript" src="lex-search.js"></script>
    <meta charset="UTF-8" />
    <style>
      .conjugation > .conjugation {
          padding-left: 20px;
      }
      #thetable {
          margin-top: 100px;
      }
      #controls {
          width: 100%;
          background-color: rgba(255, 255, 255, 0.9);
          position: fixed;
          left: 0px;
          top: 0px;
          padding: 15px;
      }
    </style>
  </head>
  <body onload="setup(); doSearch();">
    <div id="controls">
      <span>Search</span>
      <select id="searchwhat" onchange="doSearch();">
        <option value="1">Everything</option>
        <option value="2">Roots</option>
        <option value="3">Definitions</options>
      </select>
      <span>for</span>
      <input type="text" id="search" onkeyup="doSearch();"></input>
      <label for="regex">Regex? </label>
      <input type="checkbox" id="regex" onclick="doSearch();"></input>
    </div>
    <table border="1" id="thetable">
      <thead>
        <tr>
          <th>Root</th>
          <th>Definition</th>
        </tr>
      </thead>
      <tbody id="defs"></tbody>
    </table>
    <p id="matches"></p>
  </body>
</html>
